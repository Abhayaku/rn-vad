pre-commit:
  parallel: true
  commands:

    lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: bash -c '. "$HOME/.nvm/nvm.sh" && ./node_modules/.bin/eslint {staged_files}'

    types:
      glob: "*.{js,ts, jsx, tsx}"
      run: bash -c '. "$HOME/.nvm/nvm.sh" && ./node_modules/.bin/tsc'
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: bash -c '. "$HOME/.nvm/nvm.sh" && ./node_modules/.bin/commitlint --edit'
